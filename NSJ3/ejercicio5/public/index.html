<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto 5 — innerHTML</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

  <div class="container py-4">
    <h2 class="mb-1">Proyecto 5</h2>
    <p class="text-muted mb-4">Agregá elementos HTML al documento usando <code>innerHTML</code>.</p>

    <!-- Barra de botones -->
    <div class="card mb-4">
      <div class="card-header fw-semibold">Insertar elementos con innerHTML</div>
      <div class="card-body d-flex flex-wrap gap-2">
        <button class="btn btn-primary"   onclick="agregarTarjeta()">🃏 Agregar tarjeta</button>
        <button class="btn btn-success"   onclick="agregarAlerta()">🔔 Agregar alerta</button>
        <button class="btn btn-warning"   onclick="agregarTabla()">📋 Agregar tabla</button>
        <button class="btn btn-danger"    onclick="agregarBadges()">🏷 Agregar badges</button>
        <button class="btn btn-info"      onclick="agregarProgress()">📊 Agregar barras</button>
        <button class="btn btn-dark"      onclick="agregarCita()">💬 Agregar cita</button>
        <button class="btn btn-secondary" onclick="agregarListaOrdenada()">📝 Agregar lista</button>
        <button class="btn btn-outline-danger" onclick="limpiarTodo()">🗑 Limpiar todo</button>
      </div>
    </div>

    <!-- Contador -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <span class="text-muted small">Elementos insertados: <strong id="contador">0</strong></span>
      <span class="badge bg-secondary" id="ultimo-tipo">—</span>
    </div>

    <!-- Contenedor de inserción -->
    <div id="zona-insercion">
      <div id="placeholder" class="placeholder-zona text-center py-5 text-muted border rounded">
        <div class="fs-1 mb-2">📥</div>
        <p class="mb-0">Hacé click en un botón para agregar elementos aquí.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./scripts/index.js"></script>
</body>
</html>
