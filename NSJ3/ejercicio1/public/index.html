<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto DOM con Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- HEADER -->
    <header class="bg-dark text-white text-center py-3">
        <h1 class="h3 m-0">Proyecto Interacción DOM</h1>
    </header>

    <!-- MAIN -->
    <main class="container my-4 flex-grow-1">

        <div class="row g-2">

            <div class="col-12 col-md-6 col-lg-4">
                <button id="btnAgregarH1" class="btn btn-primary w-100">Agregar H1</button>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <button id="btnCambiarTexto" class="btn btn-secondary w-100">Cambiar texto</button>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <button id="btnColor" class="btn btn-success w-100">Cambiar color</button>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <button id="btnAgregarImg" class="btn btn-danger w-100">Agregar imagen</button>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <button id="btnCambiarImg" class="btn btn-warning w-100">Cambiar imagen</button>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <button id="btnTamano" class="btn btn-info w-100">Cambiar tamaño</button>
            </div>

        </div>

        <div id="contenedor" class="mt-4 text-center"></div>

    </main>

    <!-- FOOTER -->
    <footer class="bg-dark text-white text-center py-2 mt-auto">
        <p class="mb-0">© 2026 Proyecto Express + Bootstrap</p>
    </footer>

    <script src="./scripts/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
