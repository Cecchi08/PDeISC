<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto 3 — Eventos DHTML</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<div class="container py-4">

  <h2 class="mb-1">Proyecto 3</h2>
  <p class="text-muted mb-4">Navegación + contador de hijos del DOM</p>

  <!-- NAV -->
  <div class="row g-2 mb-4 text-center">

    <div class="col-6 col-md-2"><button class="btn btn-primary w-100 nav-btn" data-target="comp1">Contador</button></div>
    <div class="col-6 col-md-2"><button class="btn btn-success w-100 nav-btn" data-target="comp2">Colores</button></div>
    <div class="col-6 col-md-2"><button class="btn btn-warning w-100 nav-btn" data-target="comp3">Validación</button></div>
    <div class="col-6 col-md-2"><button class="btn btn-info w-100 nav-btn" data-target="comp4">Preview</button></div>
    <div class="col-6 col-md-2"><button class="btn btn-danger w-100 nav-btn" data-target="comp5">Estilos</button></div>

  </div>

  <!-- COMPONENTES -->
  <div class="row g-4">

    <!-- COMPONENTE 1 -->
    <div class="col-12 col-md-6 componente d-none" id="comp1">
      <div class="card h-100">
        <div class="card-header d-flex justify-content-between">
          <span>Contador</span>
          <span class="badge bg-primary">click</span>
        </div>

        <div class="card-body text-center" id="contenedor-comp1">

          <div id="contador-display" class="display-1 text-primary mb-3">0</div>

          <div class="d-flex justify-content-center gap-2 mb-3">
            <button id="btn-restar" class="btn btn-outline-danger">−</button>
            <button id="btn-sumar" class="btn btn-primary">+</button>
            <button id="btn-reset" class="btn btn-outline-secondary">↺</button>
          </div>

          <button class="btn btn-dark btn-hijos w-100">Ver hijos</button>
          <div class="alert alert-secondary mt-2 resultado-hijos">---</div>

        </div>
      </div>
    </div>

    <!-- COMPONENTE 2 -->
    <div class="col-12 col-md-6 componente d-none" id="comp2">
        <div class="card h-100">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold">Galería de colores</span>
            <span class="badge bg-success">evento: mouseover</span>
          </div>
          <div class="card-body">
            <p class="text-muted small mb-3">Pasá el mouse sobre cada tarjeta</p>
            <div class="d-flex gap-2 flex-wrap" id="galeria-colores">
                <div class="color-card rounded" data-color="#FF6B6B" data-name="Coral"></div>
                <div class="color-card rounded" data-color="#4ECDC4" data-name="Turquesa"></div>
                <div class="color-card rounded" data-color="#45B7D1" data-name="Cielo"></div>
                <div class="color-card rounded" data-color="#96CEB4" data-name="Menta"></div>
                <div class="color-card rounded" data-color="#FFEAA7" data-name="Vainilla"></div>
                <div class="color-card rounded" data-color="#DDA0DD" data-name="Orquídea"></div>
            </div>
            <div id="color-info" class="mt-3 p-2 rounded text-center color-info-box">
              <span class="text-muted small">Sin selección</span>
            </div>
            
          <button class="btn btn-dark btn-hijos w-100">Ver hijos</button>
          <div class="alert alert-secondary mt-2 resultado-hijos">---</div>
          </div>
        </div>
      </div>

    <!-- COMPONENTE 3 -->
    <div class="col-12 col-md-6 componente d-none" id="comp3">
        <div class="card h-100">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span class="fw-semibold">Validador de campos</span>
            <span class="badge bg-warning text-dark">evento: focus / blur</span>
          </div>
          <div class="card-body">
            <p class="text-muted small mb-3">Hacé click en cada campo y luego salí</p>
            <div class="mb-3">
              <label class="form-label small fw-semibold">Nombre de usuario</label>
              <input type="text" id="input-usuario" class="form-control" placeholder="mínimo 4 caracteres">
              <div id="msg-usuario" class="form-text"></div>
            </div>
            <div class="mb-3">
              <label class="form-label small fw-semibold">Email</label>
              <input type="text" id="input-email" class="form-control" placeholder="ejemplo@correo.com">
              <div id="msg-email" class="form-text"></div>
            </div>
            <div class="mb-0">
              <label class="form-label small fw-semibold">Contraseña</label>
              <input type="password" id="input-pass" class="form-control" placeholder="mínimo 6 caracteres">
              <div id="msg-pass" class="form-text"></div>
            </div>
            <button class="btn btn-dark btn-hijos w-100">Ver hijos</button>
            <div class="alert alert-secondary mt-2 resultado-hijos">---</div>
          </div>
        </div>
      </div> 


    <!-- COMPONENTE 4 -->
    <div class="col-12 col-md-6 componente d-none" id="comp4">
      <div class="card h-100">
        <div class="card-header d-flex justify-content-between">
          <span>Preview</span>
          <span class="badge bg-info">keyup</span>
        </div>

        <div class="card-body" id="contenedor-comp4">

          <input class="form-control mb-2" placeholder="Título">
          <textarea class="form-control mb-3"></textarea>

          <button class="btn btn-dark btn-hijos w-100">Ver hijos</button>
          <div class="alert alert-secondary mt-2 resultado-hijos">---</div>

        </div>
      </div>
    </div>

    <!-- COMPONENTE 5 -->
    <div class="col-12 componente d-none" id="comp5">
      <div class="card">
        <div class="card-header d-flex justify-content-between">
          <span>Estilos</span>
          <span class="badge bg-danger">change</span>
        </div>

        <div class="card-body" id="contenedor-comp5">

          <select class="form-select mb-3">
            <option>Opción 1</option>
            <option>Opción 2</option>
          </select>

          <button class="btn btn-dark btn-hijos w-100">Ver hijos</button>
          <div class="alert alert-secondary mt-2 resultado-hijos">---</div>

        </div>
      </div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="./scripts/index.js"></script>

</body>
</html>
